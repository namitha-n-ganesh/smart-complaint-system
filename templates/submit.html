{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="mb-4"><i class="bi bi-pencil-square text-primary"></i> Submit a Complaint</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" placeholder="Brief title of your complaint" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="5"
              placeholder="Describe your complaint in detail..." required></textarea>
          </div>
          <div class="alert alert-info py-2">
            <i class="bi bi-robot me-1"></i> Category and priority will be auto-detected by our AI system.
          </div>
          <button type="submit" class="btn btn-primary">Submit Complaint</button>
          <a href="{{ url_for('complaints.dashboard') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
