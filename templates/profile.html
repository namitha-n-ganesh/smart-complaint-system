{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-6">
        <div class="card text-white bg-primary shadow-sm text-center p-3">
          <h6>Total Complaints</h6><h2>{{ total }}</h2>
        </div>
      </div>
      <div class="col-6">
        <div class="card text-white bg-success shadow-sm text-center p-3">
          <h6>Resolved</h6><h2>{{ resolved }}</h2>
        </div>
      </div>
    </div>

    <!-- Profile Form -->
    <div class="card shadow">
      <div class="card-body p-4">
        <h5 class="mb-4"><i class="bi bi-person-circle text-primary me-2"></i>My Profile</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
          </div>
          <hr>
          <p class="text-muted small">Leave password fields blank to keep current password.</p>
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
